# Cloudflare Pages + Functions configuration.
# The site (dist/) and the API (functions/) deploy together to one Pages project.

name = "gather-ghana-events"
compatibility_date = "2024-09-25"
pages_build_output_dir = "dist"
# account is pinned via CLOUDFLARE_ACCOUNT_ID at deploy time (ghwmelite@gmail.com:
# ea2eb3a9813660dfca2a60e594858538) — Pages config does not allow account_id here.

# Production vars. For LOCAL dev, override these in .dev.vars (gitignored) —
# e.g. set ENVIRONMENT=development to expose magic-link dev links, and
# SITE_URL=http://localhost:8788 so generated links point at the local server.
# SITE_URL pins the canonical public origin so magic-link + Paystack callback
# URLs (and the CORS allowlist) always use the apex domain — not www or *.pages.dev.
[vars]
ENVIRONMENT = "production"
SITE_URL = "https://gge.ohwpstudios.org"
# Transactional email. EMAIL_FROM's domain MUST be verified in Resend (ohwpstudios.org).
EMAIL_FROM = "Gather Ghana Events <hello@ohwpstudios.org>"
# Organizer allowlist (comma list). New-inquiry notices go to the first entry
# unless ORGANIZER_NOTIFY is set separately.
ORGANIZER_EMAILS = "ohwpstudios@gmail.com"
PAYSTACK_CURRENCY = "GHS"
PAYSTACK_CHANNELS = "mobile_money,card"
WORKERS_AI_MODEL = "@cf/meta/llama-3.3-70b-instruct-fp8-fast"

# D1 binding.
[[d1_databases]]
binding = "DB"
database_name = "gather-ghana"
database_id = "7434495a-7c4f-4ea2-9d95-b75f2ac2ca51"

# Workers AI — powers the "Akwaaba" concierge for free (no external key).
# Default model is set in code (WORKERS_AI_MODEL var can override).
[ai]
binding = "AI"

# Secrets (set with `wrangler pages secret put <NAME> --project-name=gather-ghana-events`):
#   SESSION_SECRET        long random string           (signs portal sessions) — SET
#   RESEND_API_KEY        Resend API key (re_...)       (enables ALL transactional email) — NEXT
#   TELEGRAM_BOT_TOKEN    BotFather token              (enables the Telegram bot)
#   TELEGRAM_SECRET       optional webhook secret header for Telegram
#   PAYSTACK_SECRET_KEY   sk_test_/sk_live_            (held off for now)
#   WHATSAPP_TOKEN/_PHONE_ID/_VERIFY_TOKEN              (held off for now)
